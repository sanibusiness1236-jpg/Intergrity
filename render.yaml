services:
  # ── Backend API (Node / Express) ───────────────────────────────────────────
  - type: web
    name: integrity-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health

    # ── Instance size (vertical scale) ───────────────────────────────────────
    # Standard = 2 GB RAM / 1 CPU. This is the practical minimum for a real
    # exam load: the OCR worker thread, many websocket connections, and bcrypt
    # logins all need headroom that the 512 MB free/starter tiers don't have.
    # For very large cohorts (1000+ concurrent) move to "pro" (4 GB / 2 CPU).
    plan: standard

    # ── Horizontal scale (multiple instances behind Render's load balancer) ──
    # Manual scaling works on ALL paid plans. 3 instances comfortably handles
    # the login spike at the start of an exam and the submit spike at the end.
    # Bump this up for bigger cohorts (each Standard instance handles a few
    # hundred concurrent students with these optimizations).
    #
    # IMPORTANT: multiple instances REQUIRE REDIS_URL to be set (see below) so
    # the Socket.IO Redis adapter can share live-monitoring rooms / presence
    # across instances. Without it, real-time monitoring fragments per instance.
    numInstances: 3

    # ── Autoscaling (Pro workspace and above only) ───────────────────────────
    # If you are on a Pro plan, DELETE `numInstances` above and uncomment this
    # block to scale automatically with load (autoscaling overrides numInstances).
    # scaling:
    #   minInstances: 2
    #   maxInstances: 8
    #   targetCPUPercent: 65
    #   targetMemoryPercent: 75

    # Give in-flight exam requests up to 2 minutes to finish before an instance
    # is shut down during a deploy or scale-down (default is only 30s).
    maxShutdownDelaySeconds: 120

    # Run schema migrations + super-admin seed ONCE per deploy (not on every
    # instance boot). Render runs this a single time before routing traffic to
    # the new version, which is exactly what a multi-instance setup needs.
    preDeployCommand: "npx prisma migrate deploy && node prisma/seed.js"

    envVars:
      # ── Keep-alive: self-ping so the free tier never cold-starts ──────────
      # Render injects the service's own public URL via the special
      # fromService.property = "host" reference — no manual editing needed.
      - key: PUBLIC_URL
        value: https://integrity-backend.onrender.com
        # ↑ Render will override this with the real host on first deploy via
        #   the dashboard.  You can also change it to use the sync approach:
        #   fromService:
        #     name: integrity-backend
        #     type: web
        #     property: host

      # ── Core settings ──────────────────────────────────────────────────────
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000

      # ── Secrets — set the values in Render Dashboard → Environment ─────────
      # (Leave these here; Render ignores blank values and lets you fill them
      #  in the dashboard without touching this file.)
      - key: DATABASE_URL
        sync: false             # secret — enter value in dashboard
      - key: DATABASE_URL_DIRECT
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_LOGO_BUCKET
        value: institution-logos
      # REQUIRED when running more than one instance: the Socket.IO Redis
      # adapter uses this to share live-monitoring rooms/presence across
      # instances, and the auth-cache lives here too. Use a hosted Redis
      # (e.g. Upstash) in the same region as this service for best latency.
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        sync: false             # e.g. https://your-app.vercel.app
      - key: ML_SERVICE_URL
        sync: false             # e.g. https://YOUR-NAME-integrity-ml.hf.space
      - key: HF_TOKEN
        sync: false
